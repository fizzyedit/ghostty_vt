# Tagging `vX.Y.Z` here builds libghostty-vt from ghostty-org/ghostty (with Zig 0.15.x, which
# this repo's toolchain scissors problem requires — see README.md) for every supported target,
# and publishes one combined package as a release asset. Downstream repos (e.g. fizzyedit/ghostty)
# consume it as a normal `build.zig.zon` dependency — see README.md "Consuming from a Zig project".
#
# A `workflow_dispatch` run (no tag) only exercises the build matrix — useful for testing a new
# `ghostty_ref` before committing to a tag — and does not publish anything.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ghostty_ref:
        description: "ghostty-org/ghostty ref to build (tag/branch/sha). Defaults to the pinned ref below."
        required: false
        default: ""

# Pinned ghostty-org/ghostty ref this repo builds by default. Bump this (and push a matching tag
# here) to move to a newer ghostty release — see README.md "Bumping the pinned ghostty version".
env:
  GHOSTTY_REF_DEFAULT: v1.3.1

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      ghostty_ref: ${{ steps.v.outputs.ghostty_ref }}
    steps:
      - id: v
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          ref="${{ inputs.ghostty_ref }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "ghostty_ref=${ref:-$GHOSTTY_REF_DEFAULT}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    name: build ${{ matrix.target_id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal (arm64+x86_64) fat binary via ghostty's own xcframework step. Requires a
          # real macOS runner + Xcode (lipo/xcodebuild) — cannot be cross-compiled from Linux.
          - target_id: macos-universal
            runner: macos-14
            mode: xcframework
          - target_id: linux-x86_64
            runner: ubuntu-latest
            mode: static
            zig_target: x86_64-linux-gnu
          - target_id: linux-aarch64
            runner: ubuntu-latest
            mode: static
            zig_target: aarch64-linux-gnu
          - target_id: windows-x86_64
            runner: windows-latest
            mode: static
            zig_target: x86_64-windows
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout ghostty-org/ghostty@${{ needs.setup.outputs.ghostty_ref }}
        uses: actions/checkout@v4
        with:
          repository: ghostty-org/ghostty
          ref: ${{ needs.setup.outputs.ghostty_ref }}
          path: ghostty

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build libghostty-vt (xcframework)
        if: matrix.mode == 'xcframework'
        working-directory: ghostty
        run: zig build -Demit-lib-vt -Doptimize=ReleaseFast -p ../out

      - name: Build libghostty-vt (static, ${{ matrix.zig_target }})
        if: matrix.mode == 'static'
        working-directory: ghostty
        shell: bash
        run: zig build -Demit-lib-vt -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }} -p ../out

      # Normalizes both build modes into a common `staged/lib/<target_id>/...` +
      # `staged/include/...` shape so the publish job can merge every target's output blindly.
      - name: Stage lib + headers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "staged/lib/${{ matrix.target_id }}" staged/include
          if [ "${{ matrix.mode }}" = "xcframework" ]; then
            xc="out/lib/ghostty-vt.xcframework/macos-arm64_x86_64"
            cp "$xc/libghostty-vt.a" "staged/lib/${{ matrix.target_id }}/"
            cp -R "$xc/Headers/." staged/include/
          else
            lib_name="libghostty-vt.a"
            [ "${{ matrix.target_id }}" = "windows-x86_64" ] && lib_name="ghostty-vt-static.lib"
            cp "out/lib/$lib_name" "staged/lib/${{ matrix.target_id }}/"
            cp -R out/include/. staged/include/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: staged-${{ matrix.target_id }}
          path: staged

  publish:
    if: github.event_name == 'push'
    needs: [setup, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ghostty_vt

      - uses: actions/download-artifact@v4
        with:
          pattern: staged-*
          path: dl

      - name: Assemble package
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          set -euo pipefail
          out="ghostty-vt-v${VERSION}"
          mkdir -p "$out/lib" "$out/include"
          cp ghostty_vt/package/build.zig "$out/"
          sed "s/__VERSION__/${VERSION}/" ghostty_vt/package/build.zig.zon > "$out/build.zig.zon"
          for d in dl/staged-*; do
            cp -R "$d"/lib/. "$out/lib/"
          done
          # Headers are identical across targets (pure C API) — one copy is enough.
          cp -R dl/staged-macos-universal/include/. "$out/include/"
          tar -czf "${out}.tar.gz" "$out"
          ls -la "${out}.tar.gz"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          files: ghostty-vt-v${{ needs.setup.outputs.version }}.tar.gz
